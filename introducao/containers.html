<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style type ="text/css">
        div{
            color: #fff;
        }
    </style>

    <title>Trampando com containers</title>
</head>
<body>
    <div class="container bg-dark">container 540px larg min para 100%</div>
    <div class="container-md bg-primary">container-sm 720px larg min para 100%</div>
    <div class="container-lg bg-danger">container-lg 960px larg min para 100%</div>
    <div class="container-xl bg-success">container-xl 1140px larg min para 100%</div>
    <div class="container-xxl bg-info">container-xxl 1320px larg min para 100%</div>
    <div class="container-fluid bg-warning">container-fluid sempre 100%</div>
</body>
</html>
