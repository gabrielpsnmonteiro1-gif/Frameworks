<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Framework A </title>
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow">
            <h3>Cadastro -------------------------------------</h3>
            <form>
                <div class="mb-3">
                    <label>Nome</label>
                    <input type="text" placeholder="Digite seu nome" class="form-control">
                </div>

                <div class="mb-3">
                    <label>E-mail</label>
                    <input type="text" placeholder="Digite seu E-mail" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Senha</label>
                    <input type="text" placeholder="Digite sua senha" class="form-control">
                </div>

                <button type="button" class="btn btn-primary w-100 mb-3">Cadastrar</button>
            </form>
        </div>
    </div>
</body>
</html>
